name: EOD Signals

on:
  schedule:
    - cron: '15 10 * * 1-5'   # 10:15 UTC = 15:45 IST, Mon-Fri (after NSE close)
  workflow_dispatch: {}        # manual "Run workflow" button

permissions:
  contents: write              # to commit the regenerated page (also keeps the schedule alive)

concurrency:
  group: eod-signals
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python generate_digest.py
      - name: Commit & deploy page
        run: |
          git config user.name "eod-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/history.json
          git diff --cached --quiet || git commit -m "EOD digest $(date -u +%F)"
          git push
